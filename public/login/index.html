<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stripe Connect Marketplace</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="container">
        <h1>Stripe Connect Marketplace</h1>
        <nav>
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/products">Products</a></li>
            <li><a href="/login" class="active">Login</a></li>
            <li><a href="/register">Register</a></li>
            <li><a href="/cart" class="cart-link">Cart <span class="cart-count">0</span></a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="auth-container">
          <div class="auth-card">
            <h2>Login to Your Account</h2>
            <form id="login-form">
              <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
              </div>
              <div class="form-group">
                <button type="submit" class="btn primary btn-block">Login</button>
              </div>
              <div class="form-footer">
                <p>Don't have an account? <a href="/register">Register</a></p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2025 Stripe Connect Marketplace. All rights reserved.</p>
        <div class="footer-links">
          <a href="/about">About</a>
          <a href="/terms">Terms</a>
          <a href="/privacy">Privacy</a>
          <a href="/contact">Contact</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
