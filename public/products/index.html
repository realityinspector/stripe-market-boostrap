<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Stripe Connect Marketplace</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="container">
        <h1>Stripe Connect Marketplace</h1>
        <nav>
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/products" class="active">Products</a></li>
            <li><a href="/login">Login</a></li>
            <li><a href="/register">Register</a></li>
            <li><a href="/cart" class="cart-link">Cart <span class="cart-count">0</span></a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="products-header">
          <h1>All Products</h1>
          <div class="search-bar">
            <input type="text" placeholder="Search products...">
            <button class="btn search-button">Search</button>
          </div>
        </div>

        <div class="products-container">
          <aside class="filters">
            <h3>Filters</h3>
            <div class="filter-group">
              <h4>Price Range</h4>
              <div class="price-range">
                <input type="range" min="0" max="1000" value="1000" class="price-slider" id="price-slider">
                <div class="price-values">
                  <span>$0</span>
                  <span class="price-max">$<span id="price-value">1000</span></span>
                </div>
              </div>
            </div>
            <div class="filter-group">
              <h4>Categories</h4>
              <div class="categories">
                <label><input type="checkbox" value="electronics"> Electronics</label>
                <label><input type="checkbox" value="clothing"> Clothing</label>
                <label><input type="checkbox" value="home"> Home & Garden</label>
                <label><input type="checkbox" value="toys"> Toys & Games</label>
                <label><input type="checkbox" value="beauty"> Beauty & Personal Care</label>
              </div>
            </div>
            <button class="btn primary apply-filters">Apply Filters</button>
          </aside>

          <div class="product-grid">
            <div class="product-list">
              <!-- Products will be loaded here dynamically -->
              <div class="loading">Loading products...</div>
            </div>
            <div class="pagination">
              <button class="btn" id="prev-page" disabled>Previous</button>
              <span class="page-info">Page <span id="current-page">1</span> of <span id="total-pages">1</span></span>
              <button class="btn" id="next-page">Next</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2025 Stripe Connect Marketplace. All rights reserved.</p>
        <div class="footer-links">
          <a href="/about">About</a>
          <a href="/terms">Terms</a>
          <a href="/privacy">Privacy</a>
          <a href="/contact">Contact</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
