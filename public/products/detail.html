<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - Stripe Connect Marketplace</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="container">
        <h1>Stripe Connect Marketplace</h1>
        <nav>
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/products" class="active">Products</a></li>
            <li><a href="/login">Login</a></li>
            <li><a href="/register">Register</a></li>
            <li><a href="/cart" class="cart-link">Cart <span class="cart-count">0</span></a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="product-details">
          <div class="loading">Loading product details...</div>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2025 Stripe Connect Marketplace. All rights reserved.</p>
        <div class="footer-links">
          <a href="/about">About</a>
          <a href="/terms">Terms</a>
          <a href="/privacy">Privacy</a>
          <a href="/contact">Contact</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Extract product ID from URL
      const path = window.location.pathname;
      const productId = path.split('/').pop();
      
      if (productId && !isNaN(productId)) {
        loadProductDetails(productId);
      } else {
        // Invalid product ID, redirect to products page
        window.location.href = '/products';
      }
    });
  </script>
</body>
</html>
